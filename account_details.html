<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bank App - Private Wealth Details</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Specific detail page styles */
        .details-header {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            background: white;
            justify-content: space-between;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .back-btn {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-primary);
        }

        .details-header h1 {
            font-size: 20px;
            font-weight: 600;
        }

        .qr-icon {
            color: var(--text-primary);
        }

        .tabs {
            display: flex;
            border-bottom: 1px solid var(--border-color);
            background: white;
        }

        .tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            font-size: 15px;
            font-weight: 700;
            color: var(--fnb-teal);
            position: relative;
        }

        .tab.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--fnb-teal);
        }

        .account-hero {
            background: white;
            padding: 24px 20px;
            text-align: left;
        }

        .card-preview {
            width: 100%;
            max-width: 320px;
            margin: 0 auto 24px;
            height: 200px;
            background-image: url('card.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            border-radius: 0;
            /* Let the PNG handle the corners */
        }

        .account-info-main {
            margin-bottom: 24px;
        }

        .account-title-large {
            font-size: 22px;
            font-weight: 800;
            color: #000;
            line-height: 1.2;
            margin-bottom: 8px;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 4px;
        }

        .detail-row .label {
            font-size: 16px;
            color: #888;
            font-weight: 600;
        }

        .detail-row .value {
            font-size: 16px;
            color: #888;
            font-weight: 400;
            text-align: right;
        }

        .detail-row.bold .value {
            color: #666;
            font-weight: 500;
        }

        .options-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            padding: 20px;
            background: #fff;
            margin-bottom: 8px;
        }

        .option-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            text-align: center;
        }

        .option-icon-box {
            width: 60px;
            height: 60px;
            border: 1px solid #ddd;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--fnb-teal);
        }

        .option-item span {
            font-size: 13px;
            font-weight: 600;
            color: #000;
            line-height: 1.1;
        }

        .secondary-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            padding: 0 20px 20px;
            background: #fff;
        }

        .secondary-grid .option-icon-box {
            color: var(--fnb-teal);
        }
    </style>
</head>

<body>
    <div class="mobile-container">
        <!-- Status Bar -->
        <div class="status-bar">
            <span class="time">4:53</span>
            <div class="status-icons">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 20h.01M7 20h.01M17 20h.01M2 20h.01M22 20h.01"></path>
                    <path d="M12 16h.01M7 16h.01M17 16h.01M5 16h.01M19 16h.01"></path>
                    <path d="M12 12h.01M7 12h.01M17 12h.01M5 12h.01M19 12h.01"></path>
                    <path d="M12 8h.01M7 8h.01M17 8h.01M2 8h.01M22 8h.01"></path>
                </svg>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M18.5 2.5a.5.5 0 0 1 .5.5v18a.5.5 0 0 1-.5.5h-13a.5.5 0 0 1-.5-.5V3a.5.5 0 0 1 .5-.5h13Z">
                    </path>
                </svg>
                <div class="battery">
                    <span>48</span>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="2" y="7" width="16" height="10" rx="2" ry="2"></rect>
                        <line x1="22" y1="11" x2="22" y2="13"></line>
                    </svg>
                </div>
            </div>
        </div>

        <!-- Header -->
        <div class="details-header">
            <div class="header-left">
                <button class="back-btn" onclick="window.history.back()">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="19" y1="12" x2="5" y2="12"></line>
                        <polyline points="12 19 5 12 12 5"></polyline>
                    </svg>
                </button>
                <h1>Options</h1>
            </div>
            <div class="qr-icon">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="3" width="7" height="7"></rect>
                    <rect x="14" y="3" width="7" height="7"></rect>
                    <rect x="14" y="14" width="7" height="7"></rect>
                    <rect x="3" y="14" width="7" height="7"></rect>
                </svg>
            </div>
        </div>

        <!-- Tabs -->
        <div class="tabs">
            <div class="tab">Transactio...</div>
            <div class="tab active">Accou...</div>
        </div>

        <!-- Hero Content -->
        <div class="account-hero">
            <div class="card-preview"></div>
            <div class="account-info-main">
                <h2 class="account-title-large">Private Wealth Credit</h2>
                <div class="detail-row bold">
                    <span class="label">Account Number</span>
                    <span class="value">62262406674</span>
                </div>
                <div class="detail-row">
                    <span class="label">Balance</span>
                    <span class="value">N$ 52402</span>
                </div>
                <div class="detail-row">
                    <span class="label">Available</span>
                    <span class="value">N$ 61623</span>
                </div>
            </div>
        </div>

        <!-- Main Grid -->
        <div class="options-grid">
            <div class="option-item">
                <div class="option-icon-box">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="1.5">
                        <rect x="2" y="5" width="20" height="14" rx="2"></rect>
                        <line x1="7" y1="15" x2="17" y2="15"></line>
                    </svg>
                </div>
                <span>My Cards</span>
            </div>
            <div class="option-item">
                <div class="option-icon-box" style="color: var(--fnb-orange);">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="1.5">
                        <path d="M20 7h-9"></path>
                        <path d="M14 17H5"></path>
                        <circle cx="17" cy="17" r="3"></circle>
                        <circle cx="7" cy="7" r="3"></circle>
                    </svg>
                </div>
                <span>Buy + Gift</span>
            </div>
            <div class="option-item">
                <div class="option-icon-box">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="1.5">
                        <rect x="2" y="5" width="20" height="14" rx="2"></rect>
                        <line x1="2" y1="10" x2="22" y2="10"></line>
                    </svg>
                </div>
                <span>Pay</span>
            </div>
            <div class="option-item">
                <div class="option-icon-box">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="1.5">
                        <path d="m17 2 4 4-4 4"></path>
                        <path d="M3 11v-1a4 4 0 0 1 4-4h14"></path>
                        <path d="m7 22-4-4 4-4"></path>
                        <path d="M21 13v1a4 4 0 0 1-4 4H3"></path>
                    </svg>
                </div>
                <span>Transfer</span>
            </div>
        </div>

        <!-- Secondary Grid -->
        <div class="secondary-grid">
            <div class="option-item">
                <div class="option-icon-box">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="1.5">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                        <line x1="3" y1="9" x2="21" y2="9"></line>
                        <line x1="9" y1="21" x2="9" y2="9"></line>
                    </svg>
                </div>
                <span>Detailed Balance</span>
            </div>
            <div class="option-item">
                <div class="option-icon-box">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="1.5">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                        <polyline points="14 2 14 8 20 8"></polyline>
                        <circle cx="10" cy="13" r="2"></circle>
                        <path d="m16 19-2-2"></path>
                    </svg>
                </div>
                <span>Account Informatio...</span>
            </div>
            <div class="option-item">
                <div class="option-icon-box">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="1.5">
                        <path d="M20 7h-9"></path>
                        <path d="M14 17H5"></path>
                        <circle cx="17" cy="17" r="3"></circle>
                        <circle cx="7" cy="7" r="3"></circle>
                    </svg>
                </div>
                <span>Account Settings</span>
            </div>
            <div class="option-item">
                <div class="option-icon-box">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="1.5">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                        <polyline points="14 2 14 8 20 8"></polyline>
                        <line x1="16" y1="13" x2="8" y2="13"></line>
                        <line x1="16" y1="17" x2="8" y2="17"></line>
                        <line x1="10" y1="9" x2="8" y2="9"></line>
                    </svg>
                </div>
                <span>Statement History</span>
            </div>
        </div>

        <!-- Bottom Navigation (Fixed) -->
        <nav class="bottom-nav">
            <div class="nav-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                    <polyline points="9 22 9 12 15 12 15 22"></polyline>
                </svg>
                <span>Home</span>
            </div>
            <div class="nav-item active">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="2" y="5" width="20" height="14" rx="2"></rect>
                    <line x1="2" y1="10" x2="22" y2="10"></line>
                </svg>
                <span>Bank</span>
            </div>
            <div class="nav-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                </svg>
                <span>Message</span>
            </div>
            <div class="nav-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="7" r="4"></circle>
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                </svg>
                <span>My profile</span>
            </div>
            <div class="nav-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="3" y1="12" x2="21" y2="12"></line>
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                    <line x1="3" y1="18" x2="21" y2="18"></line>
                </svg>
                <span>Menu</span>
            </div>
        </nav>
    </div>
</body>

</html>
